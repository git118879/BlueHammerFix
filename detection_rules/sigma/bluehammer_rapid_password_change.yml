title: Rapid Password Change-Logon-Restore Cycle — BlueHammer Credential Abuse
id: 9b4f3d12-c8e5-4ea2-b7f4-2f3e6d9c0b1a
status: experimental
description: |
    Detects the BlueHammer pattern of changing a user's password, logging in with the
    new password, then restoring the original password within a short time window.
    This indicates pass-the-hash using SamiChangePasswordUser where the attacker knows
    the NTLM hash but not the plaintext.
references:
    - https://github.com/yourorg/bluehammer-analysis
date: 2026/04/06
author: Red Team
logsource:
    product: windows
    service: security
detection:
    password_change:
        EventID:
            - 4723
            - 4724
    logon_success:
        EventID: 4624
        LogonType: 2
    selection:
        EventID:
            - 4723
            - 4724
            - 4624
    condition: selection
    # NOTE: Correlation logic — alert when for the SAME TargetUserName:
    # EventID 4723/4724 followed by EventID 4624 followed by EventID 4723/4724
    # all within 30 seconds. Most SIEM platforms require custom correlation rules
    # for temporal sequencing. See SIEM-specific implementation notes below.
falsepositives:
    - Automated password rotation tools (should not logon between changes)
    - IT helpdesk scripts that reset and verify passwords
level: critical
tags:
    - attack.credential_access
    - attack.t1003.002
    - attack.persistence
    - attack.t1098
---
# SIEM Implementation Notes
#
# Splunk:
#   index=wineventlog sourcetype="WinEventLog:Security"
#   (EventCode=4723 OR EventCode=4724 OR EventCode=4624)
#   | transaction TargetUserName maxspan=30s
#   | where eventcount >= 3
#   | search EventCode=4723 EventCode=4624
#
# Elastic/KQL:
#   sequence by winlog.event_data.TargetUserName with maxspan=30s
#     [authentication where event.code : ("4723", "4724")]
#     [authentication where event.code == "4624" and winlog.event_data.LogonType == "2"]
#     [authentication where event.code : ("4723", "4724")]
#
# Microsoft Sentinel:
#   SecurityEvent
#   | where EventID in (4723, 4724, 4624)
#   | summarize EventSequence=make_list(EventID), Count=count()
#     by TargetUserName, bin(TimeGenerated, 30s)
#   | where Count >= 3
